# Keep the Gradle JVM heap moderate so the OS has free RAM for the native AAPT2
# daemon. An oversized heap (e.g. 8G+) starves AAPT2 and causes
# "Link timed out" during release resource processing.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.caching=true
# Run the Kotlin compiler inside the Gradle process to avoid intermittent
# "Could not connect to Kotlin compile daemon" failures on this machine.
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
android.enableJetifier=true
# Raise network timeouts (default 30s) so large Android toolchain artifacts
# pulled in by plugins download on slow/flaky connections instead of failing
# with "Read timed out".
systemProp.org.gradle.internal.http.connectionTimeout=300000
systemProp.org.gradle.internal.http.socketTimeout=300000
